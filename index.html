<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunday AI</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body { 
            background-color: #131314; 
            color: #e3e3e3; 
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; 
            display: flex; 
            flex-direction: column;
            justify-content: space-between; 
            align-items: center; 
            height: 100vh; 
            padding: 20px;
        }
        
        /* Header Title & Animated Logo Area */
        .header {
            text-align: center;
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .sunday-logo-core {
            width: 64px;
            height: 64px;
            position: relative;
            filter: drop-shadow(0 0 15px rgba(66, 133, 244, 0.4));
            animation: pulseGlow 4s ease-in-out infinite;
        }
        .sunday-logo-core svg {
            width: 100%;
            height: 100%;
        }
        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 12px rgba(66, 133, 244, 0.3)); }
            50% { transform: scale(1.04); filter: drop-shadow(0 0 22px rgba(155, 114, 203, 0.6)); }
        }
        .header h1 {
            font-size: 32px;
            font-weight: 500;
            letter-spacing: -0.5px;
            background: linear-gradient(74deg, #4285f4 0%, #9b72cb 30%, #d96570 70%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }
        .header p {
            color: #808185;
            font-size: 16px;
        }

        /* Central Streaming Conversation Feed */
        .chat-box { 
            width: 100%;
            max-width: 760px;
            height: 52vh; 
            overflow-y: auto; 
            padding: 10px;
            display: flex; 
            flex-direction: column; 
            gap: 24px;
            margin: 20px 0;
        }
        .chat-box::-webkit-scrollbar {
            width: 4px;
        }
        .chat-box::-webkit-scrollbar-thumb {
            background: #3c4043;
            border-radius: 10px;
        }

        .msg-row {
            display: flex;
            width: 100%;
        }
        .user-row { justify-content: flex-end; }
        .sunday-row { justify-content: flex-start; }

        .msg { 
            padding: 12px 20px; 
            border-radius: 22px; 
            font-size: 16px; 
            line-height: 1.6; 
            max-width: 80%; 
            word-wrap: break-word;
        }
        .user-msg { 
            background-color: #303134; 
            color: #e3e3e3; 
            border-bottom-right-radius: 4px;
        }
        .sunday-msg { 
            background-color: transparent; 
            color: #e3e3e3; 
            padding-left: 0;
        }

        /* Bottom Floating Input Architecture */
        .input-container {
            width: 100%;
            max-width: 760px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .input-wrapper {
            width: 100%;
            background-color: #1e1f20;
            border-radius: 32px;
            padding: 6px 12px 6px 24px;
            display: flex;
            align-items: center;
            transition: background-color 0.2s;
        }
        .input-wrapper:focus-within {
            background-color: #2a2b2d;
        }
        .input-box { 
            flex: 1;
            height: 48px;
            border: none;
            background: transparent;
            color: #e3e3e3; 
            font-size: 16px; 
            outline: none; 
        }
        .input-box::placeholder {
            color: #808185;
        }

        /* Sleek Circular Action Button */
        .action-btn { 
            background: linear-gradient(135deg, #1fa2ff, #12d8fa, #a6ffcb);
            border: none; 
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer; 
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .action-btn:hover { 
            transform: scale(1.05);
        }
        .action-btn svg {
            fill: #131314;
            width: 18px;
            height: 18px;
            transform: rotate(-45deg);
        }
        .status-display { 
            color: #808185; 
            font-size: 12px; 
            letter-spacing: 0.3px;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="sunday-logo-core">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 0C12 6.62742 17.3726 12 24 12C17.3726 12 12 17.3726 12 24C12 17.3726 6.62742 12 0 12C6.62742 12 12 6.62742 12 0Z" fill="url(#geminiGrad)"/>
            <defs>
                <linearGradient id="geminiGrad" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
                    <stop offset="0%" stop-color="#4285f4" />
                    <stop offset="50%" stop-color="#9b72cb" />
                    <stop offset="100%" stop-color="#d96570" />
                </linearGradient>
            </defs>
        </svg>
    </div>
    <h1>Hello, Sir</h1>
    <p>How can Sunday assist your workflow today?</p>
</div>

<div class="chat-box" id="chat-logs">
    <div class="msg-row sunday-row">
        <div class="msg sunday-msg">Neural interface synchronized. Sunday core is listening.</div>
    </div>
</div>

<div class="input-container">
    <div class="input-wrapper">
        <input type="text" id="console-input" class="input-box" placeholder="Ask Sunday anything..." onkeypress="checkKey(event)">
        <button class="action-btn" onclick="executePayload()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
    <div id="status-text" class="status-display">Sunday AI Framework // Connected</div>
</div>

<script>
    let currentAudioPlayback = null;

    function checkKey(e) { if (e.key === "Enter") executePayload(); }

    function executePayload() {
        const input = document.getElementById('console-input');
        const status = document.getElementById('status-text');
        const chatLogs = document.getElementById('chat-logs');
        const queryText = input.value.trim();

        if (!queryText) return;

        // INTERRUPT PROTOCOL: Mute Sunday immediately if user types a new command mid-sentence
        if (currentAudioPlayback !== null) {
            currentAudioPlayback.pause();
            currentAudioPlayback.currentTime = 0;
        }

        const rowUser = document.createElement('div');
        rowUser.className = 'msg-row user-row';
        const userDiv = document.createElement('div');
        userDiv.className = 'msg user-msg';
        userDiv.innerText = queryText;
        rowUser.appendChild(userDiv);
        chatLogs.appendChild(rowUser);
        chatLogs.scrollTop = chatLogs.scrollHeight;

        status.innerText = "Computing response grid...";
        input.value = "";

        const packet = new FormData();
        packet.append('message', queryText);

        fetch('/ask', { method: 'POST', body: packet })
        .then(res => res.json())
        .then(data => {
            const rowSunday = document.createElement('div');
            rowSunday.className = 'msg-row sunday-row';
            const sundayDiv = document.createElement('div');
            sundayDiv.className = 'msg sunday-msg';
            sundayDiv.innerText = data.text;
            rowSunday.appendChild(sundayDiv);
            chatLogs.appendChild(rowSunday);
            chatLogs.scrollTop = chatLogs.scrollHeight;
            status.innerText = "Streaming audio array...";

            currentAudioPlayback = new Audio('/get-audio?' + new Date().getTime());
            currentAudioPlayback.play();

            if (data.map_link) {
                status.innerText = "Deploying map visualization overlay...";
                setTimeout(() => {
                    window.open(data.map_link, '_blank');
                    status.innerText = "Sunday AI Framework // Connected";
                }, 2000); 
            } else {
                currentAudioPlayback.onended = () => {
                    status.innerText = "Sunday AI Framework // Connected";
                };
            }
        })
        .catch(err => {
            status.innerText = "Mainframe connection fault.";
            console.error(err);
        });
    }
</script>
</body>
</html>
